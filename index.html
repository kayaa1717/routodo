<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Routodo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --primary:#2196F3;--primary-light:#64B5F6;--primary-dark:#1976D2;
  --bg:#F5F5F5;--card:#FFFFFF;--text:#212121;--text-light:#9E9E9E;
  --border:#E0E0E0;--danger:#F44336;--success:#4CAF50;--warning:#FF9800;
  --purple:#9C27B0;--pink:#E91E63;--teal:#009688;
  --shadow:0 1px 4px rgba(0,0,0,0.08);--shadow-lg:0 4px 16px rgba(0,0,0,0.12);
  --sidebar-w:260px;
}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;font-size:15px;}
.sync-indicator{position:fixed;top:8px;right:60px;z-index:999;font-size:12px;padding:4px 12px;border-radius:12px;font-weight:600;display:none;align-items:center;gap:4px;}
.sync-indicator.saving{display:flex;background:#FFF3CD;color:#856404;}
.sync-indicator.saved{display:flex;background:#D4EDDA;color:#155724;}
.sync-indicator.error{display:flex;background:#F8D7DA;color:#721C24;}
.sync-indicator.loading{display:flex;background:#CCE5FF;color:#004085;}
.top-bar{position:fixed;top:0;left:0;right:0;height:54px;background:var(--card);z-index:100;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 18px;}
.app-logo{font-size:20px;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:6px;}
.app-logo svg{width:24px;height:24px;}
.header-actions{display:flex;gap:6px;}
.header-btn{width:38px;height:38px;border:none;background:var(--bg);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-light);transition:0.2s;font-size:16px;}
.header-btn:hover{background:var(--primary);color:#fff;}
.hamburger{display:none;width:38px;height:38px;border:none;background:var(--bg);border-radius:10px;cursor:pointer;align-items:center;justify-content:center;color:var(--text-light);}
.app-layout{display:flex;margin-top:54px;height:calc(100vh - 54px);}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100%;overflow-y:auto;padding:10px 0;}
.nav-section{margin-bottom:2px;}
.nav-section-header{display:flex;align-items:center;gap:10px;padding:12px 18px;cursor:pointer;font-size:16px;font-weight:600;color:var(--text);transition:0.15s;user-select:none;border-left:3px solid transparent;}
.nav-section-header:hover{background:var(--bg);}
.nav-section-header.active{color:var(--primary);background:rgba(33,150,243,0.06);border-left-color:var(--primary);}
.nav-section-header .icon{font-size:18px;width:24px;text-align:center;}
.nav-section-header .arrow{margin-left:auto;font-size:12px;color:var(--text-light);transition:transform 0.25s;}
.nav-section-header.active .arrow{transform:rotate(90deg);}
.nav-sub{max-height:0;overflow:hidden;transition:max-height 0.3s ease;}
.nav-sub.open{max-height:600px;}
.nav-sub-item{display:flex;align-items:center;gap:8px;padding:9px 18px 9px 42px;cursor:pointer;font-size:15px;font-weight:500;color:var(--text-light);transition:0.15s;border-left:3px solid transparent;}
.nav-sub-item:hover{background:var(--bg);color:var(--text);}
.nav-sub-item.active{color:var(--primary);font-weight:600;background:rgba(33,150,243,0.06);border-left-color:var(--primary-light);}
.nav-sub-item .sub-icon{font-size:16px;width:22px;text-align:center;}
.nav-sub-item .sub-count{margin-left:auto;font-size:12px;font-weight:600;background:var(--bg);padding:2px 8px;border-radius:8px;color:var(--text-light);}
.nav-sub-item.active .sub-count{background:rgba(33,150,243,0.12);color:var(--primary);}
.nav-add-row{display:flex;align-items:center;gap:8px;padding:7px 18px 7px 42px;cursor:pointer;font-size:14px;color:var(--text-light);transition:0.15s;}
.nav-add-row:hover{color:var(--primary);}
.main-content{flex:1;overflow-y:auto;padding:24px 32px 80px;background:var(--bg);}
.content-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px;}
.content-title{font-size:24px;font-weight:700;display:flex;align-items:center;gap:8px;}
.content-title-text{cursor:pointer;border:1px solid transparent;padding:2px 6px;border-radius:6px;outline:none;transition:0.15s;}
.content-title-text:hover{border-color:var(--border);background:var(--bg);}
.content-subtitle{font-size:14px;color:var(--text-light);margin-top:2px;}
.mobile-back{display:none;width:38px;height:38px;border:none;background:var(--bg);border-radius:10px;cursor:pointer;align-items:center;justify-content:center;color:var(--text-light);margin-right:8px;flex-shrink:0;}
.inline-add{background:var(--card);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);margin-bottom:16px;}
.inline-add-row{display:flex;align-items:center;gap:10px;}
.inline-add-row input{flex:1;border:none;outline:none;font-size:16px;font-family:inherit;background:transparent;padding:6px 0;}
.inline-add-row input::placeholder{color:var(--text-light);}
.inline-opts{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center;}
.inline-opt-btn{padding:6px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-weight:500;cursor:pointer;background:var(--bg);color:var(--text-light);transition:0.15s;font-family:inherit;display:flex;align-items:center;gap:4px;}
.inline-opt-btn:hover{border-color:var(--primary);color:var(--primary);}
.inline-opt-btn.sel{border-color:var(--primary);background:#E3F2FD;color:var(--primary);}
.inline-opt-btn.submit{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:600;}
.inline-opt-select{padding:6px 10px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;cursor:pointer;background:var(--bg);color:var(--text-light);font-family:inherit;outline:none;}
.todo-section{margin-bottom:22px;}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:8px 2px;margin-bottom:8px;}
.section-title{font-size:14px;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:0.5px;}
.section-count{font-size:12px;background:var(--bg);padding:2px 8px;border-radius:8px;color:var(--text-light);}
.todo-list{display:flex;flex-direction:column;gap:6px;}
.todo-item{display:flex;align-items:flex-start;gap:12px;background:var(--card);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);transition:0.2s;cursor:pointer;position:relative;overflow:hidden;}
.todo-item:hover{box-shadow:var(--shadow-lg);}
.todo-item.completed .todo-text{text-decoration:line-through;color:var(--text-light);}
.todo-checkbox{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.2s;margin-top:1px;}
.todo-checkbox:hover{border-color:var(--primary);}
.todo-checkbox.checked{background:var(--success);border-color:var(--success);}
.todo-checkbox.checked::after{content:'✓';color:#fff;font-size:13px;font-weight:700;}
.todo-info{flex:1;min-width:0;}
.todo-text{font-size:16px;font-weight:500;line-height:1.5;}
.todo-meta{display:flex;align-items:center;gap:6px;margin-top:4px;font-size:12px;color:var(--text-light);flex-wrap:wrap;}
.todo-tag{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;}
.tag-urgent{background:#FFEBEE;color:var(--danger);}
.tag-normal{background:#E3F2FD;color:var(--primary);}
.tag-low{background:#E8F5E9;color:var(--success);}
.todo-priority-bar{position:absolute;left:0;top:0;bottom:0;width:3px;}
.priority-high{background:var(--danger);}
.priority-medium{background:var(--warning);}
.priority-low{background:var(--success);}
.todo-actions{display:flex;gap:4px;opacity:0;transition:0.2s;flex-shrink:0;}
.todo-item:hover .todo-actions{opacity:1;}
.todo-action-btn{width:30px;height:30px;border-radius:8px;border:none;background:var(--bg);color:var(--text-light);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:0.15s;}
.todo-action-btn:hover{background:var(--primary);color:#fff;}
.todo-action-btn.danger:hover{background:var(--danger);}

/* ═══ ROUTINE ═══ */
.routine-week-nav{display:flex;align-items:center;justify-content:center;gap:12px;padding:10px 0 8px;}
.routine-week-nav .week-title{font-size:22px;font-weight:700;text-align:center;min-width:180px;}
.routine-week-nav button{width:34px;height:34px;border:none;background:transparent;border-radius:50%;cursor:pointer;font-size:16px;color:var(--text-light);display:flex;align-items:center;justify-content:center;transition:0.2s;}
.routine-week-nav button:hover{background:var(--bg);color:var(--text);}
.routine-week-nav .today-btn{padding:5px 14px;border:none;border-radius:14px;background:var(--primary);color:#fff;font-size:13px;font-weight:600;cursor:pointer;width:auto;height:auto;}
.routine-grid{background:var(--card);overflow:hidden;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.routine-grid table{width:100%;border-collapse:collapse;table-layout:fixed;}
.routine-grid table col.rg-col-name{width:140px;}
.routine-grid table col.rg-col-day{/* remaining 7 cols share equally */}
.routine-grid th,.routine-grid td{border-bottom:1px solid var(--border);text-align:center;vertical-align:middle;}
.routine-grid thead th{padding:8px 2px;font-weight:600;}
.routine-grid thead th.rg-corner{text-align:left;padding-left:12px;}
.routine-grid thead th .day-name{font-size:14px;font-weight:600;color:var(--text-light);display:block;}
.routine-grid thead th .day-num{width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:var(--text);margin-top:2px;}
.routine-grid thead th.today .day-num{background:var(--primary);color:#fff;}
.routine-grid thead th.today .day-name{color:var(--primary);font-weight:700;}
.routine-grid thead th.sun .day-name{color:var(--danger);}
.routine-grid thead th.sat .day-name{color:var(--primary);}
.routine-grid tbody tr:last-child td{border-bottom:none;}
.routine-grid tbody td.rg-name-cell{text-align:left;padding:0 12px;height:42px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:15px;font-weight:500;color:var(--text);border-right:1px solid var(--border);}
.routine-grid tbody td.rg-name-cell:hover{background:var(--bg);}
.routine-grid tbody td.rg-day-cell{height:42px;padding:0;position:relative;}
.routine-grid tbody td.rg-day-cell.today-col{background:rgba(33,150,243,0.04);}
.rg-check-btn{width:100%;height:100%;min-height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.1s;user-select:none;border:none;background:transparent;font-size:0;color:transparent;}
.rg-check-btn:hover{background:#F5F5F5;}
.rg-check-btn.checked{background:transparent;}
.rg-check-btn.checked::after{content:'';display:block;width:22px;height:22px;border-radius:50%;background:var(--primary);position:relative;}
.rg-check-btn.checked::before{content:'✓';position:absolute;z-index:1;font-size:14px;font-weight:700;color:#fff;line-height:22px;text-align:center;width:22px;height:22px;}
/* cleaner check: use a single pseudo with SVG-like check */
.rg-check-btn.checked{position:relative;font-size:0;}
.rg-check-btn.checked::after{content:'';display:block;width:24px;height:24px;border-radius:50%;background:var(--primary);}
.rg-check-btn.checked::before{content:'✓';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:15px;font-weight:700;color:#fff;z-index:1;line-height:1;}

.routine-stats-section{margin-top:14px;}
.routine-stats-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center;}
.routine-stats-row .rs-label{font-size:13px;font-weight:600;color:var(--text-light);min-width:44px;display:flex;align-items:center;}
.routine-stat-chip{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:6px 12px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:4px;}
.routine-stat-chip .chip-val{color:var(--primary);}

/* ID/PW */
.idpw-table-wrap{background:var(--card);border-radius:16px;box-shadow:var(--shadow);overflow-x:auto;margin-bottom:18px;}
.idpw-table{width:100%;border-collapse:collapse;font-size:15px;}
.idpw-table thead th{padding:14px 16px;font-weight:600;font-size:14px;color:var(--text-light);border-bottom:2px solid var(--border);text-align:left;}
.idpw-table tbody td{padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:middle;}
.idpw-table tbody tr:hover{background:var(--bg);}
.pw-cell{display:flex;align-items:center;gap:8px;}
.pw-mask{font-family:monospace;font-size:15px;letter-spacing:1px;}
.pw-toggle,.pw-copy{width:28px;height:28px;border:none;background:transparent;cursor:pointer;color:var(--text-light);font-size:16px;display:flex;align-items:center;justify-content:center;border-radius:6px;}
.pw-toggle:hover,.pw-copy:hover{background:var(--bg);color:var(--primary);}
.owner-badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:13px;font-weight:600;}
.owner-dain{background:#E3F2FD;color:var(--primary);}
.owner-dahun{background:#F3E5F5;color:var(--purple);}
.idpw-actions{display:flex;gap:4px;}
.idpw-action-btn{width:30px;height:30px;border:none;border-radius:8px;background:var(--bg);color:var(--text-light);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:0.15s;}
.idpw-action-btn:hover{background:var(--primary);color:#fff;}
.idpw-action-btn.danger:hover{background:var(--danger);}
.yt-card{background:var(--card);border-radius:14px;padding:14px 18px;box-shadow:var(--shadow);margin-bottom:10px;display:flex;align-items:center;gap:14px;transition:0.2s;}
.yt-card:hover{box-shadow:var(--shadow-lg);}
.yt-icon{width:44px;height:44px;border-radius:12px;background:#FF0000;color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.yt-info{flex:1;min-width:0;}
.yt-name{font-size:16px;font-weight:600;}
.yt-url{font-size:13px;color:var(--text-light);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.yt-link{padding:8px 16px;border-radius:10px;background:#FF0000;color:#fff;text-decoration:none;font-size:14px;font-weight:600;flex-shrink:0;}

/* CALENDAR */
.skin-month-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:18px;}
.skin-month-nav .month-title{font-size:20px;font-weight:700;min-width:140px;text-align:center;}
.skin-month-nav button{width:36px;height:36px;border:none;background:var(--card);border-radius:50%;cursor:pointer;font-size:16px;color:var(--text-light);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);}
.skin-month-nav button:hover{background:var(--primary);color:#fff;}
.skin-cal{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:18px;margin-bottom:18px;}
.skin-cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px;}
.skin-cal-weekday{text-align:center;font-size:14px;font-weight:600;color:var(--text-light);padding:6px 0;}
.skin-cal-weekday:first-child{color:var(--danger);}
.skin-cal-weekday:nth-child(7){color:var(--primary);}
.skin-cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.skin-cal-day{min-height:76px;border-radius:10px;padding:6px 8px;font-size:14px;cursor:pointer;transition:0.15s;border:1px solid transparent;}
.skin-cal-day:hover{background:var(--bg);border-color:var(--border);}
.skin-cal-day.other{opacity:0.3;}
.skin-cal-day .day-num{font-weight:700;font-size:15px;margin-bottom:3px;}
.skin-cal-day.today .day-num{background:var(--primary);color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.skin-cal-day .skin-dot{font-size:12px;line-height:1.4;color:var(--primary);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.treatment-group{background:var(--card);border-radius:14px;box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden;}
.treatment-group-header{padding:14px 16px;font-size:16px;font-weight:700;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:#FAFAFA;}
.treatment-group-header .tg-count{font-size:12px;font-weight:600;color:var(--primary);background:#E3F2FD;padding:2px 8px;border-radius:10px;margin-left:auto;}
.treatment-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);gap:12px;transition:0.15s;}
.treatment-row:last-child{border-bottom:none;}
.treatment-row:hover{background:#FAFAFA;}
.treatment-num{width:28px;height:28px;border-radius:50%;background:var(--primary);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.treatment-info{flex:1;min-width:0;}
.treatment-date{font-size:14px;font-weight:600;}
.treatment-clinic{font-size:12px;color:var(--text-light);margin-top:1px;}
.treatment-term{font-size:12px;font-weight:600;color:var(--primary);background:#E3F2FD;padding:2px 10px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
.treatment-actions{display:flex;gap:4px;flex-shrink:0;opacity:0;transition:0.15s;}
.treatment-row:hover .treatment-actions{opacity:1;}
.points-section{margin-bottom:18px;}
.points-card{background:var(--card);border-radius:14px;padding:14px 18px;box-shadow:var(--shadow);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.points-card .clinic-name{font-size:16px;font-weight:600;display:flex;align-items:center;gap:6px;}
.points-card .clinic-points{font-size:18px;font-weight:700;color:var(--primary);}
.points-edit-btn{width:30px;height:30px;border:none;border-radius:8px;background:var(--bg);color:var(--text-light);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;}
.points-edit-btn:hover{background:var(--primary);color:#fff;}
.fab{position:fixed;bottom:26px;right:30px;width:56px;height:56px;border-radius:50%;border:none;background:var(--card);color:var(--text);font-size:30px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.15);display:flex;align-items:center;justify-content:center;transition:0.3s;z-index:90;}
.fab:hover{transform:scale(1.05);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;opacity:0;pointer-events:none;transition:0.3s;display:flex;align-items:center;justify-content:center;}
.modal-overlay.active{opacity:1;pointer-events:auto;}
.modal{background:var(--card);border-radius:20px;width:100%;max-width:480px;padding:28px 24px 32px;transform:translateY(30px) scale(0.97);transition:0.35s cubic-bezier(.4,0,.2,1);max-height:85vh;overflow-y:auto;margin:0 12px;}
.modal-overlay.active .modal{transform:translateY(0) scale(1);}
.modal-title{font-size:20px;font-weight:700;margin-bottom:20px;}
.form-group{margin-bottom:16px;}
.form-label{font-size:13px;font-weight:600;color:var(--text-light);margin-bottom:6px;display:block;}
.form-input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:15px;font-family:inherit;outline:none;transition:0.2s;background:var(--bg);}
.form-input:focus{border-color:var(--primary);background:#fff;}
.form-row{display:flex;gap:10px;}
.form-row .form-group{flex:1;}
.priority-select{display:flex;gap:8px;}
.priority-option{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border);text-align:center;font-size:13px;font-weight:600;cursor:pointer;transition:0.2s;background:var(--bg);}
.priority-option.selected{border-color:var(--primary);background:#E3F2FD;color:var(--primary);}
.color-select{display:flex;gap:8px;flex-wrap:wrap;}
.color-option{width:34px;height:34px;border-radius:50%;cursor:pointer;transition:0.2s;border:3px solid transparent;}
.color-option.selected{border-color:var(--text);transform:scale(1.15);}
.btn-submit{width:100%;padding:14px;border:none;border-radius:14px;background:var(--primary);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:0.2s;margin-top:8px;}
.btn-submit:hover{opacity:0.9;}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-light);}
.empty-icon{font-size:52px;margin-bottom:12px;}
.empty-title{font-size:18px;font-weight:600;margin-bottom:6px;color:var(--text);}
.empty-desc{font-size:14px;}
.context-menu{position:fixed;background:var(--card);border-radius:12px;box-shadow:var(--shadow-lg);padding:6px;z-index:300;min-width:150px;display:none;}
.context-menu.visible{display:block;}
.context-item{padding:10px 14px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;transition:0.15s;}
.context-item:hover{background:var(--bg);}
.context-item.danger{color:var(--danger);}
@keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

}

    <script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getFirestore,doc,setDoc,getDoc,onSnapshot}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyAOrr-nI2kxze9gvUrbFuejHfP9ctYQme4",authDomain:"routodo-d0c30.firebaseapp.com",projectId:"routodo-d0c30",storageBucket:"routodo-d0c30.firebasestorage.app",messagingSenderId:"695109558401",appId:"1:695109558401:web:577ad52ec9754f802ced80"});
const db=getFirestore(app),DR=doc(db,"appdata","main");

function showSync(t,m){const e=document.getElementById('syncIndicator');e.className='sync-indicator '+t;e.textContent=m;if(t==='saved')setTimeout(()=>{e.style.display='none';},2000);}
let saveTimer=null,skip=false;
function saveToCloud(){clearTimeout(saveTimer);saveTimer=setTimeout(async()=>{try{showSync('saving','☁️ 저장 중...');skip=true;
const d={categories:S.categories,todos:S.todos,routines:S.routines,routineChecks:S.routineChecks,idpw:S.idpw,youtube:S.youtube,skinRecords:S.skinRecords,skinPoints:S.skinPoints,customCalendars:S.customCalendars,customCalRecords:S.customCalRecords,customTools:S.customTools,todoDividers:S.todoDividers,updatedAt:Date.now()};
await setDoc(DR,d);showSync('saved','✅ 저장 완료');}catch(e){console.error(e);showSync('error','❌ 저장 실패');}},800);}
async function loadFromCloud(){try{showSync('loading','📥 불러오는 중...');const snap=await getDoc(DR);if(snap.exists()){applyData(snap.data());showSync('saved','✅ 동기화 완료');}else{showSync('saved','✅ 새 데이터');}}catch(e){console.error(e);showSync('error','❌ 불러오기 실패');}}
function applyData(d){const keys=['categories','todos','routines','routineChecks','idpw','youtube','skinRecords','skinPoints','customCalendars','customCalRecords','customTools','todoDividers'];keys.forEach(k=>{if(d[k]!==undefined)S[k]=d[k];});saveLocal();renderSidebar();renderContent();}
onSnapshot(DR,(snap)=>{if(skip){skip=false;return;}if(snap.exists())applyData(snap.data());});
window.manualSync=async function(){await loadFromCloud();renderSidebar();renderContent();};

const S={
  activeSection:'todo',activeSubId:'all',
  categories:[{id:'inbox',name:'전체',icon:'📥'},{id:'work',name:'업무',icon:'💼'},{id:'personal',name:'개인',icon:'👤'}],
  todos:[],routines:[],routineChecks:{},
  idpw:[],youtube:[],skinRecords:[],skinPoints:[],
  customCalendars:[],customCalRecords:{},customTools:[],todoDividers:{},
  calYear:new Date().getFullYear(),calMonth:new Date().getMonth(),
  routineWeekOffset:0,
  editingRoutineId:null,editingIdpwId:null,editingYtId:null,editingSkinId:null,editingPointsId:null,editingCCRecId:null,
  contextTarget:null,contextType:null,_inlinePriority:null,_ccId:null
};
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5);}
function fmtDate(d){const dt=new Date(d);return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;}
function saveLocal(){try{localStorage.setItem('routodo_data',JSON.stringify({categories:S.categories,todos:S.todos,routines:S.routines,routineChecks:S.routineChecks,idpw:S.idpw,youtube:S.youtube,skinRecords:S.skinRecords,skinPoints:S.skinPoints,customCalendars:S.customCalendars,customCalRecords:S.customCalRecords,customTools:S.customTools,todoDividers:S.todoDividers}));}catch(e){}}
function loadLocal(){try{const d=JSON.parse(localStorage.getItem('routodo_data'));if(d){const keys=['categories','todos','routines','routineChecks','idpw','youtube','skinRecords','skinPoints','customCalendars','customCalRecords','customTools','todoDividers'];keys.forEach(k=>{if(d[k]!==undefined)S[k]=d[k];});}}catch(e){}}
function save(){saveLocal();saveToCloud();}

/* ── SIDEBAR ── */
function renderSidebar(){
const sb=document.getElementById('sidebar');
const sections=[
  {id:'todo',icon:'✅',name:'To Do',subs:[...S.categories.map(c=>({id:c.id,icon:c.icon,name:c.name,count:S.todos.filter(t=>(!t.done)&&(c.id==='inbox'||t.category===c.id)).length})),{id:'__add__',icon:'+',name:'카테고리 추가',isAdd:true}]},
  {id:'routine',icon:'🔄',name:'Routine',subs:[]},
  {id:'calendar',icon:'📅',name:'Calendar',subs:[{id:'skin',icon:'🏥',name:'피부과',count:S.skinRecords.length},...S.customCalendars.map(c=>({id:'cc_'+c.id,icon:c.icon,name:c.name,count:(S.customCalRecords[c.id]||[]).length})),{id:'__addCal__',icon:'+',name:'캘린더 추가',isAdd:true}]},
  {id:'tools',icon:'🛠',name:'Tools',subs:[{id:'idpw',icon:'🔐',name:'ID/PW',count:S.idpw.length},{id:'youtube',icon:'📺',name:'YouTube',count:S.youtube.length},...S.customTools.map(t=>({id:'ct_'+t.id,icon:t.icon,name:t.name})),{id:'__addTool__',icon:'+',name:'도구 추가',isAdd:true}]}
];
let h='';
sections.forEach(sec=>{
  const isOpen=S.activeSection===sec.id;const hasSubs=sec.subs.length>0;
  h+=`<div class="nav-section"><div class="nav-section-header${isOpen?' active':''}" onclick="clickSection('${sec.id}')"><span class="icon">${sec.icon}</span><span>${sec.name}</span>${hasSubs?'<span class="arrow">▸</span>':''}</div>`;
  if(hasSubs){h+=`<div class="nav-sub${isOpen?' open':''}">`;sec.subs.forEach(sub=>{if(sub.isAdd){h+=`<div class="nav-add-row" onclick="clickAddRow('${sub.id}')"><span>+ ${sub.name}</span></div>`;}else{const active=isOpen&&S.activeSubId===sub.id;h+=`<div class="nav-sub-item${active?' active':''}" onclick="clickSub('${sec.id}','${sub.id}')"><span class="sub-icon">${sub.icon}</span><span>${sub.name}</span>${sub.count!==undefined?`<span class="sub-count">${sub.count}</span>`:''}</div>`;}});h+=`</div>`;}
  h+=`</div>`;
});
sb.innerHTML=h;}
window.clickSection=function(id){S.activeSection=id;if(id==='todo')S.activeSubId=S.categories[0]?.id||'all';else if(id==='routine')S.activeSubId='routine';else if(id==='calendar')S.activeSubId='skin';else if(id==='tools')S.activeSubId='idpw';renderSidebar();renderContent();if(window.innerWidth<=768){document.getElementById('mainContent').classList.add('visible');document.getElementById('sidebar').classList.add('hidden');}};
window.clickSub=function(sec,subId){S.activeSection=sec;S.activeSubId=subId;renderSidebar();renderContent();if(window.innerWidth<=768){document.getElementById('mainContent').classList.add('visible');document.getElementById('sidebar').classList.add('hidden');}};
window.clickAddRow=function(id){if(id==='__add__')openModal('catModal');else if(id==='__addCal__')openModal('customCalModal');else if(id==='__addTool__')openModal('customToolModal');};
window.toggleMobileSidebar=function(){document.getElementById('sidebar').classList.toggle('hidden');document.getElementById('mainContent').classList.remove('visible');};
window.mobileGoBack=function(){document.getElementById('mainContent').classList.remove('visible');document.getElementById('sidebar').classList.remove('hidden');};

/* ── RENDER ── */
function renderContent(){
  const ct=document.getElementById('contentTitle'),cs=document.getElementById('contentSubtitle'),cb=document.getElementById('contentBody');
  document.getElementById('fabBtn').style.display='flex';
  if(S.activeSection==='todo')renderTodo(ct,cs,cb);
  else if(S.activeSection==='routine')renderRoutinePage(ct,cs,cb);
  else if(S.activeSection==='calendar')renderCalendarPage(ct,cs,cb);
  else if(S.activeSection==='tools')renderToolsPage(ct,cs,cb);
}

/* ══════════ TODO ══════════ */
function renderTodo(ct,cs,cb){
  const cat=S.categories.find(c=>c.id===S.activeSubId)||S.categories[0];
  ct.innerHTML=`<span>${cat.icon}</span><span class="content-title-text" contenteditable="true" onblur="renameCat('${cat.id}',this.textContent)">${cat.name}</span>`;
  const todos=cat.id==='inbox'?S.todos:S.todos.filter(t=>t.category===cat.id);
  const active=todos.filter(t=>!t.done),done=todos.filter(t=>t.done);
  cs.textContent=`${active.length}개 할 일`;
  let h='';
  /* inline add */
  h+=`<div class="inline-add"><div class="inline-add-row"><span style="font-size:20px;color:var(--text-light)">+</span><input id="inlineInput" placeholder="새 할 일 추가..." onkeydown="if(event.key==='Enter')addInlineTodo()"></div>`;
  h+=`<div class="inline-opts">`;
  ['높음','보통','낮음'].forEach(p=>{h+=`<button class="inline-opt-btn${S._inlinePriority===p?' sel':''}" onclick="setInlinePriority('${p}')">${p==='높음'?'🔴':p==='보통'?'🟡':'🟢'} ${p}</button>`;});
  if(S.categories.length>1){h+=`<select class="inline-opt-select" id="inlineCatSel">`;S.categories.forEach(c=>{h+=`<option value="${c.id}"${c.id===cat.id?' selected':''}>${c.icon} ${c.name}</option>`;});h+=`</select>`;}
  h+=`<button class="inline-opt-btn submit" onclick="addInlineTodo()">추가</button></div></div>`;
  if(active.length){h+=`<div class="todo-section"><div class="section-header"><span class="section-title">진행중</span><span class="section-count">${active.length}</span></div><div class="todo-list">`;active.forEach(t=>{h+=todoItemHTML(t);});h+=`</div></div>`;}
  if(done.length){h+=`<div class="todo-section"><div class="section-header"><span class="section-title">완료</span><span class="section-count">${done.length}</span></div><div class="todo-list">`;done.forEach(t=>{h+=todoItemHTML(t);});h+=`</div></div>`;}
  if(!todos.length)h+=`<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-title">할 일이 없습니다</div><div class="empty-desc">위에서 새 할 일을 추가해 보세요</div></div>`;
  cb.innerHTML=h;
}
function todoItemHTML(t){
  const pClass=t.priority==='높음'?'priority-high':t.priority==='낮음'?'priority-low':'priority-medium';
  const tagClass=t.priority==='높음'?'tag-urgent':t.priority==='낮음'?'tag-low':'tag-normal';
  let h=`<div class="todo-item${t.done?' completed':''}" oncontextmenu="showContext(event,'todo','${t.id}')"><div class="todo-priority-bar ${pClass}"></div>`;
  h+=`<div class="todo-checkbox${t.done?' checked':''}" onclick="toggleTodo('${t.id}')"></div>`;
  h+=`<div class="todo-info"><div class="todo-text">${t.text}</div><div class="todo-meta">`;
  if(t.priority)h+=`<span class="todo-tag ${tagClass}">${t.priority}</span>`;
  h+=`</div></div>`;
  h+=`<div class="todo-actions"><button class="todo-action-btn" onclick="editTodoInline('${t.id}')">✏️</button><button class="todo-action-btn danger" onclick="deleteTodo('${t.id}')">🗑</button></div></div>`;
  return h;
}
window.setInlinePriority=function(p){S._inlinePriority=S._inlinePriority===p?null:p;renderContent();setTimeout(()=>{document.getElementById('inlineInput')?.focus();},50);};
window.addInlineTodo=function(){const inp=document.getElementById('inlineInput');const text=inp?.value.trim();if(!text)return;const catSel=document.getElementById('inlineCatSel');const cat=catSel?catSel.value:S.activeSubId;S.todos.unshift({id:uid(),text,done:false,priority:S._inlinePriority||'보통',category:cat,createdAt:Date.now()});S._inlinePriority=null;save();renderSidebar();renderContent();};
window.toggleTodo=function(id){const t=S.todos.find(x=>x.id===id);if(t){t.done=!t.done;save();renderSidebar();renderContent();}};
window.deleteTodo=function(id){if(!confirm('삭제할까요?'))return;S.todos=S.todos.filter(t=>t.id!==id);save();renderSidebar();renderContent();};
window.editTodoInline=function(id){const t=S.todos.find(x=>x.id===id);if(!t)return;const nv=prompt('할 일 수정',t.text);if(nv!==null&&nv.trim()){t.text=nv.trim();save();renderContent();}};
window.renameCat=function(id,name){const c=S.categories.find(x=>x.id===id);if(c&&name.trim()){c.name=name.trim();save();renderSidebar();}};

/* ══════════ ROUTINE ══════════ */
function getWeekDates(offset){
  const now=new Date();const day=now.getDay();const diff=day===0?-6:1-day;
  const mon=new Date(now);mon.setDate(now.getDate()+diff+offset*7);mon.setHours(0,0,0,0);
  const dates=[];for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);dates.push(d);}
  return dates;
}
function renderRoutinePage(ct,cs,cb){
  ct.innerHTML='<span>🔄</span><span>Routine</span>';cs.textContent='';
  const dates=getWeekDates(S.routineWeekOffset);
  const dayNames=['월','화','수','목','금','토','일'];
  const today=fmtDate(new Date());
  const m0=dates[0],m6=dates[6];
  const title=m0.getMonth()===m6.getMonth()?`${m0.getFullYear()}년 ${m0.getMonth()+1}월`:`${m0.getFullYear()}년 ${m0.getMonth()+1}월 ~ ${m6.getMonth()+1}월`;

  let h=`<div class="routine-week-nav">`;
  h+=`<button onclick="moveRoutineWeek(-1)">◀</button>`;
  h+=`<div class="week-title">${title}</div>`;
  h+=`<button onclick="moveRoutineWeek(1)">▶</button>`;
  h+=`<button class="today-btn" onclick="moveRoutineWeek('today')">오늘</button>`;
  h+=`</div>`;

  /* table */
  h+=`<div class="routine-grid"><table><colgroup><col class="rg-col-name">`;
  for(let i=0;i<7;i++)h+=`<col class="rg-col-day">`;
  h+=`</colgroup><thead><tr><th class="rg-corner"></th>`;
  dates.forEach((d,i)=>{
    const ds=fmtDate(d);const isToday=ds===today;
    const isSun=i===6,isSat=i===5;
    let cls='';if(isToday)cls+=' today';if(isSun)cls+=' sun';if(isSat)cls+=' sat';
    h+=`<th class="${cls.trim()}"><span class="day-name">${dayNames[i]}</span><span class="day-num">${d.getDate()}</span></th>`;
  });
  h+=`</tr></thead><tbody>`;

  if(S.routines.length===0){
    h+=`<tr><td colspan="8" style="padding:40px;text-align:center;color:var(--text-light);font-size:15px;">루틴을 추가해 보세요</td></tr>`;
  }else{
    S.routines.forEach(r=>{
      h+=`<tr>`;
      h+=`<td class="rg-name-cell" onclick="editRoutineClick('${r.id}')">${r.name}</td>`;
      dates.forEach((d,i)=>{
        const ds=fmtDate(d);const isToday=ds===today;
        const key=r.id+'_'+ds;const checked=S.routineChecks[key];
        h+=`<td class="rg-day-cell${isToday?' today-col':''}"><button class="rg-check-btn${checked?' checked':''}" onclick="toggleRoutineCheck('${r.id}','${ds}')"></button></td>`;
      });
      h+=`</tr>`;
    });
  }
  h+=`</tbody></table></div>`;

  /* stats */
  h+=`<div class="routine-stats-section">`;
  /* daily stats */
  h+=`<div class="routine-stats-row"><span class="rs-label">📊 일별</span>`;
  dates.forEach((d,i)=>{
    const ds=fmtDate(d);
    let cnt=0;S.routines.forEach(r=>{if(S.routineChecks[r.id+'_'+ds])cnt++;});
    h+=`<span class="routine-stat-chip"><span>${dayNames[i]}</span> <span class="chip-val">${cnt}/${S.routines.length}</span></span>`;
  });
  h+=`</div>`;
  /* weekly stats */
  let weekTotal=0,weekPossible=S.routines.length*7;
  dates.forEach(d=>{const ds=fmtDate(d);S.routines.forEach(r=>{if(S.routineChecks[r.id+'_'+ds])weekTotal++;});});
  const weekRate=weekPossible?Math.round(weekTotal/weekPossible*100):0;
  h+=`<div class="routine-stats-row"><span class="rs-label">📈 주간</span>`;
  h+=`<span class="routine-stat-chip">달성 <span class="chip-val">${weekTotal}/${weekPossible}</span></span>`;
  h+=`<span class="routine-stat-chip">달성률 <span class="chip-val">${weekRate}%</span></span>`;
  h+=`</div></div>`;

  cb.innerHTML=h;
}
window.moveRoutineWeek=function(dir){if(dir==='today')S.routineWeekOffset=0;else S.routineWeekOffset+=dir;renderContent();};
window.toggleRoutineCheck=function(rid,ds){const key=rid+'_'+ds;S.routineChecks[key]=!S.routineChecks[key];save();renderContent();};
window.editRoutineClick=function(id){
  const r=S.routines.find(x=>x.id===id);if(!r)return;
  S.editingRoutineId=id;
  document.getElementById('routineModalTitle').textContent='🔄 루틴 수정';
  document.getElementById('routineInput').value=r.name;
  openModal('routineModal');
};
window.saveRoutine=function(){
  const name=document.getElementById('routineInput').value.trim();
  if(!name)return;
  if(S.editingRoutineId){
    const r=S.routines.find(x=>x.id===S.editingRoutineId);
    if(r){r.name=name;}
    S.editingRoutineId=null;
  }else{
    S.routines.push({id:uid(),name});
  }
  save();closeModal('routineModal');renderSidebar();renderContent();
};

function renderCalendarPage(ct,cs,cb){

function renderSkinPage(ct,cs,cb){
  ct.innerHTML='<span>🏥</span><span>피부과</span>';cs.textContent='관리 기록';
  const y=S.calYear,m=S.calMonth;
  let h=`<div class="skin-month-nav"><button onclick="moveSkinMonth(-1)">◀</button><div class="month-title">${y}년 ${m+1}월</div><button onclick="moveSkinMonth(1)">▶</button></div>`;
  /* calendar grid */
  h+=`<div class="skin-cal"><div class="skin-cal-weekdays">`;
  ['일','월','화','수','목','금','토'].forEach(d=>{h+=`<div class="skin-cal-weekday">${d}</div>`;});
  h+=`</div><div class="skin-cal-days">`;
  const first=new Date(y,m,1),startDay=first.getDay(),daysInMonth=new Date(y,m+1,0).getDate();
  const prevDays=new Date(y,m,0).getDate();
  const today=fmtDate(new Date());
  for(let i=0;i<startDay;i++){h+=`<div class="skin-cal-day other"><div class="day-num">${prevDays-startDay+1+i}</div></div>`;}
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=ds===today;
    const recs=S.skinRecords.filter(r=>r.date===ds);
    h+=`<div class="skin-cal-day${isToday?' today':''}" onclick="openSkinModalForDate('${ds}')"><div class="day-num">${d}</div>`;
    recs.forEach(r=>{h+=`<div class="skin-dot">${r.clinic||r.treatment}</div>`;});
    h+=`</div>`;
  }
  const totalCells=startDay+daysInMonth;const remaining=totalCells%7===0?0:7-totalCells%7;
  for(let i=1;i<=remaining;i++){h+=`<div class="skin-cal-day other"><div class="day-num">${i}</div></div>`;}
  h+=`</div></div>`;

  /* treatment groups - grouped by clinic (관리내용) */
  const groups={};
  S.skinRecords.forEach(r=>{
    const key=r.clinic||'기타';
    if(!groups[key])groups[key]=[];
    groups[key].push(r);
  });
  Object.keys(groups).sort().forEach(gName=>{
    const list=groups[gName].sort((a,b)=>new Date(a.date)-new Date(b.date));
    h+=`<div class="treatment-group"><div class="treatment-group-header"><span>${gName}</span><span class="tg-count">${list.length}회</span></div>`;
    list.forEach((r,i)=>{
      let term='';
      if(i>0){const prev=new Date(list[i-1].date),cur=new Date(r.date);const diff=Math.round((cur-prev)/(1000*60*60*24));term=`+${diff}일`;}
      h+=`<div class="treatment-row" oncontextmenu="showContext(event,'skin','${r.id}')">`;
      h+=`<div class="treatment-num">${i+1}</div>`;
      h+=`<div class="treatment-info"><div class="treatment-date">${r.date}</div><div class="treatment-clinic">${r.treatment||''}</div></div>`;
      if(term)h+=`<div class="treatment-term">${term}</div>`;
      h+=`<div class="treatment-actions"><button class="idpw-action-btn" onclick="editSkinRecord('${r.id}')">✏️</button><button class="idpw-action-btn danger" onclick="deleteSkinRecord('${r.id}')">🗑</button></div>`;
      h+=`</div>`;
    });
    h+=`</div>`;
  });

  /* points */
  if(S.skinPoints.length){
    h+=`<div class="points-section"><div class="section-header"><span class="section-title">💰 포인트</span></div>`;
    S.skinPoints.forEach(p=>{
      h+=`<div class="points-card"><div class="clinic-name">🏥 ${p.clinic}</div><div style="display:flex;align-items:center;gap:8px;"><span class="clinic-points">${Number(p.amount).toLocaleString()}P</span><button class="points-edit-btn" onclick="editPoints('${p.id}')">✏️</button></div></div>`;
    });
    h+=`</div>`;
  }
  cb.innerHTML=h;
}
window.moveSkinMonth=function(dir){S.calMonth+=dir;if(S.calMonth<0){S.calMonth=11;S.calYear--;}if(S.calMonth>11){S.calMonth=0;S.calYear++;}renderContent();};
window.openSkinModalForDate=function(ds){S.editingSkinId=null;document.getElementById('skinModalTitle').textContent='🏥 관리 기록 추가';document.getElementById('skinDate').value=ds;document.getElementById('skinTreatment').value='';document.getElementById('skinClinic').value='';document.getElementById('skinMemo').value='';openModal('skinModal');};

  else{S.skinRecords.push({id:uid(),date,treatment,clinic,memo});}

window.editPoints=function(id){const p=S.skinPoints.find(x=>x.id===id);if(!p)return;S.editingPointsId=id;document.getElementById('pointsModalTitle').textContent='💰 포인트 수정';document.getElementById('pointsClinic').value=p.clinic;document.getElementById('pointsAmount').value=p.amount;openModal('pointsModal');};

  else{S.skinPoints.push({id:uid(),clinic,amount});}
  save();closeModal('pointsModal');renderContent();

/* custom cal page */
function renderCustomCalPage(ct,cs,cb){
  const ccId=S.activeSubId.replace('cc_','');
  const cal=S.customCalendars.find(c=>c.id===ccId);
  if(!cal){cb.innerHTML='';return;}
  ct.innerHTML=`<span>${cal.icon}</span><span class="content-title-text" contenteditable="true" onblur="renameCustomCal('${ccId}',this.textContent)">${cal.name}</span>`;
  cs.textContent='';
  const y=S.calYear,m=S.calMonth;
  const recs=S.customCalRecords[ccId]||[];
  let h=`<div class="skin-month-nav"><button onclick="moveSkinMonth(-1)">◀</button><div class="month-title">${y}년 ${m+1}월</div><button onclick="moveSkinMonth(1)">▶</button></div>`;
  h+=`<div class="skin-cal"><div class="skin-cal-weekdays">`;
  ['일','월','화','수','목','금','토'].forEach(d=>{h+=`<div class="skin-cal-weekday">${d}</div>`;});
  h+=`</div><div class="skin-cal-days">`;
  const first=new Date(y,m,1),startDay=first.getDay(),daysInMonth=new Date(y,m+1,0).getDate();
  const prevDays=new Date(y,m,0).getDate();const today=fmtDate(new Date());
  for(let i=0;i<startDay;i++){h+=`<div class="skin-cal-day other"><div class="day-num">${prevDays-startDay+1+i}</div></div>`;}
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const isToday=ds===today;
    const dayRecs=recs.filter(r=>r.date===ds);
    h+=`<div class="skin-cal-day${isToday?' today':''}" onclick="openCCRecModal('${ccId}','${ds}')"><div class="day-num">${d}</div>`;
    dayRecs.forEach(r=>{h+=`<div class="skin-dot">${r.content}</div>`;});h+=`</div>`;
  }
  const totalCells=startDay+daysInMonth;const remaining=totalCells%7===0?0:7-totalCells%7;
  for(let i=1;i<=remaining;i++){h+=`<div class="skin-cal-day other"><div class="day-num">${i}</div></div>`;}
  h+=`</div></div>`;

  /* records list */
  const sorted=[...recs].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(sorted.length){
    h+=`<div class="treatment-group"><div class="treatment-group-header"><span>기록</span><span class="tg-count">${sorted.length}건</span></div>`;
    sorted.forEach((r,i)=>{
      h+=`<div class="treatment-row" oncontextmenu="showContext(event,'ccrec','${ccId}|${r.id}')"><div class="treatment-num">${sorted.length-i}</div><div class="treatment-info"><div class="treatment-date">${r.date}</div><div class="treatment-clinic">${r.content}${r.memo?' · '+r.memo:''}</div></div>`;
      h+=`<div class="treatment-actions"><button class="idpw-action-btn" onclick="editCCRec('${ccId}','${r.id}')">✏️</button><button class="idpw-action-btn danger" onclick="deleteCCRec('${ccId}','${r.id}')">🗑</button></div></div>`;
    });
    h+=`</div>`;
  }
  cb.innerHTML=h;
}
window.renameCustomCal=function(id,name){const c=S.customCalendars.find(x=>x.id===id);if(c&&name.trim()){c.name=name.trim();save();renderSidebar();}};
window.openCCRecModal=function(ccId,ds){S._ccId=ccId;S.editingCCRecId=null;document.getElementById('customCalRecTitle').textContent='📝 기록 추가';document.getElementById('ccRecDate').value=ds;document.getElementById('ccRecContent').value='';document.getElementById('ccRecMemo').value='';openModal('customCalRecModal');};

  if(S.activeSection==='routine'){S.editingRoutineId=null;document.getElementById('routineModalTitle').textContent='🔄 새 루틴 추가';document.getElementById('routineInput').value='';openModal('routineModal');}
  else if(S.activeSection==='calendar'){
    if(S.activeSubId==='skin'){S.editingSkinId=null;document.getElementById('skinModalTitle').textContent='🏥 관리 기록 추가';document.getElementById('skinDate').value=fmtDate(new Date());document.getElementById('skinTreatment').value='';document.getElementById('skinClinic').value='';document.getElementById('skinMemo').value='';openModal('skinModal');}
    else if(S.activeSubId.startsWith('cc_')){openCCRecModal(S.activeSubId.replace('cc_',''),fmtDate(new Date()));}
  }
  else if(S.activeSection==='tools'){
    if(S.activeSubId==='idpw'){S.editingIdpwId=null;document.getElementById('idpwModalTitle').textContent='🔐 계정 추가';selectOwner('다인');document.getElementById('idpwSite').value='';document.getElementById('idpwId').value='';document.getElementById('idpwPw').value='';document.getElementById('idpwMemo').value='';openModal('idpwModal');}
    else if(S.activeSubId==='youtube'){S.editingYtId=null;document.getElementById('ytModalTitle').textContent='📺 유튜브 채널 추가';document.getElementById('ytName').value='';document.getElementById('ytUrl').value='';openModal('ytModal');}
  }
  else if(S.activeSection==='todo'){document.getElementById('inlineInput')?.focus();}
};

/* category / calendar / tool creation */
const EMOJIS=['📁','💼','👤','🏠','🎯','💡','📚','🎨','🎵','🏋️','✈️','🍕','❤️','⭐','🔥','🌈','🎁','📸','🛒','💰','🏥','💊','🩺','🧴','✂️','💉','🌿','🧘','🏃','🍎','📅','📝','🔧','📊','🎓','🏖','🐱','🐶','🌸','🍀'];
function initEmojis(){
  ['catEmojiRow','calEmojiRow','toolEmojiRow'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    el.innerHTML=EMOJIS.map((e,i)=>`<div class="color-option${i===0?' selected':''}" onclick="pickEmoji('${id}',this)" style="display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--bg);border-radius:10px;">${e}</div>`).join('');
  });
}
window.pickEmoji=function(rowId,el){document.querySelectorAll(`#${rowId} .color-option`).forEach(e=>e.classList.remove('selected'));el.classList.add('selected');};
function getSelectedEmoji(rowId){const el=document.querySelector(`#${rowId} .color-option.selected`);return el?el.textContent:'📁';}
window.saveNewCategory=function(){const name=document.getElementById('newCatName').value.trim();if(!name)return;const icon=getSelectedEmoji('catEmojiRow');S.categories.push({id:uid(),name,icon});save();closeModal('catModal');renderSidebar();document.getElementById('newCatName').value='';};
window.saveCustomCal=function(){const name=document.getElementById('customCalName').value.trim();if(!name)return;const icon=getSelectedEmoji('calEmojiRow');S.customCalendars.push({id:uid(),name,icon});save();closeModal('customCalModal');renderSidebar();document.getElementById('customCalName').value='';};
window.saveCustomTool=function(){const name=document.getElementById('customToolName').value.trim();if(!name)return;const icon=getSelectedEmoji('toolEmojiRow');S.customTools.push({id:uid(),name,icon});save();closeModal('customToolModal');renderSidebar();document.getElementById('customToolName').value='';};

/* context menu */
window.showContext=function(e,type,id){e.preventDefault();S.contextType=type;S.contextTarget=id;const cm=document.getElementById('contextMenu');cm.style.left=e.clientX+'px';cm.style.top=e.clientY+'px';cm.classList.add('visible');};
document.addEventListener('click',()=>{document.getElementById('contextMenu').classList.remove('visible');});
window.editContextItem=function(){
  const t=S.contextType,id=S.contextTarget;
  if(t==='todo')editTodoInline(id);
  else if(t==='idpw')editIdpw(id);
  else if(t==='youtube')editYt(id);
  else if(t==='skin')editSkinRecord(id);
  else if(t==='ccrec'){const[ccId,recId]=id.split('|');editCCRec(ccId,recId);}
};
window.deleteContextItem=function(){
  const t=S.contextType,id=S.contextTarget;
  if(t==='todo')deleteTodo(id);
  else if(t==='idpw')deleteIdpw(id);
  else if(t==='youtube')deleteYt(id);
  else if(t==='skin')deleteSkinRecord(id);
  else if(t==='ccrec'){const[ccId,recId]=id.split('|');deleteCCRec(ccId,recId);}
};

/* ── INIT ── */
loadLocal();
initEmojis();
loadFromCloud().then(()=>{renderSidebar();renderContent();});
</script>
</body>
</html>
