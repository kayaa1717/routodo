<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routodo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            font-size: 18px;
        }

        /* Header */
        .header {
            background: #16213e;
            padding: 18px 20px;
            text-align: center;
            border-bottom: 2px solid #0f3460;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 28px;
            color: #e94560;
            letter-spacing: 2px;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #16213e;
            display: flex;
            border-top: 2px solid #0f3460;
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            padding: 14px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 15px;
            color: #888;
        }

        .nav-item.active {
            color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }

        .nav-item:hover {
            background: rgba(233, 69, 96, 0.05);
        }

        .nav-icon {
            font-size: 26px;
            margin-bottom: 4px;
        }

        .nav-label {
            font-size: 13px;
            font-weight: 600;
        }

        /* Pages */
        .page {
            display: none;
            padding: 20px;
            padding-bottom: 90px;
        }

        .page.active {
            display: block;
        }

        /* ==================== */
        /* ROUTINE PAGE STYLES  */
        /* ==================== */

        .week-navigator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            padding: 12px 0;
        }

        .week-arrow {
            background: #0f3460;
            border: none;
            color: #e94560;
            font-size: 28px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .week-arrow:hover {
            background: #e94560;
            color: #fff;
            transform: scale(1.1);
        }

        .week-arrow:active {
            transform: scale(0.95);
        }

        .week-label {
            font-size: 20px;
            font-weight: 700;
            color: #e0e0e0;
            min-width: 250px;
            text-align: center;
        }

        .week-label .year-text {
            font-size: 15px;
            color: #888;
            font-weight: 400;
        }

        .today-btn {
            background: #e94560;
            border: none;
            color: #fff;
            font-size: 14px;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .today-btn:hover {
            background: #c73650;
        }

        /* Routine Table */
        .routine-table-container {
            overflow-x: auto;
            border-radius: 16px;
            background: #16213e;
            padding: 0;
            margin-bottom: 20px;
        }

        .routine-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }

        .routine-table thead th {
            background: #0f3460;
            padding: 14px 8px;
            text-align: center;
            font-size: 15px;
            font-weight: 700;
            color: #e0e0e0;
            border-bottom: 2px solid #1a1a2e;
            position: sticky;
            top: 0;
        }

        .routine-table thead th.today-col {
            color: #e94560;
            background: #0f3460;
        }

        .routine-table thead th.today-col::after {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            background: #e94560;
            border-radius: 50%;
            margin: 6px auto 0;
        }

        .routine-table thead th:first-child {
            text-align: left;
            padding-left: 18px;
            min-width: 140px;
            font-size: 17px;
        }

        .routine-table tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
        }

        .routine-table tbody tr:hover {
            background: rgba(233, 69, 96, 0.03);
        }

        .routine-table tbody tr:last-child {
            border-bottom: none;
        }

        .routine-table tbody td {
            padding: 12px 8px;
            text-align: center;
            vertical-align: middle;
        }

        .routine-table tbody td:first-child {
            text-align: left;
            padding-left: 18px;
            font-size: 17px;
            font-weight: 600;
            color: #e0e0e0;
        }

        .routine-name-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .routine-color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .routine-delete-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 18px;
            padding: 2px 6px;
            border-radius: 4px;
            transition: all 0.2s;
            margin-left: auto;
        }

        .routine-delete-btn:hover {
            color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }

        /* Checkbox styling */
        .check-cell {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .routine-checkbox {
            appearance: none;
            -webkit-appearance: none;
            width: 36px;
            height: 36px;
            border: 3px solid #0f3460;
            border-radius: 8px;
            background: #1a1a2e;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .routine-checkbox:hover {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.05);
        }

        .routine-checkbox:checked {
            background: #e94560;
            border-color: #e94560;
        }

        .routine-checkbox:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 22px;
            font-weight: 900;
        }

        .routine-checkbox.today-check {
            border-color: #e94560;
            box-shadow: 0 0 8px rgba(233, 69, 96, 0.3);
        }

        /* Add Routine */
        .add-routine-section {
            background: #16213e;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .add-routine-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .add-routine-row input[type="text"] {
            flex: 1;
            padding: 14px 16px;
            border-radius: 12px;
            border: 2px solid #0f3460;
            background: #1a1a2e;
            color: #e0e0e0;
            font-size: 17px;
            outline: none;
            transition: border 0.3s;
        }

        .add-routine-row input[type="text"]:focus {
            border-color: #e94560;
        }

        .add-routine-row input[type="color"] {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: transparent;
        }

        .add-routine-btn {
            background: #e94560;
            border: none;
            color: #fff;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .add-routine-btn:hover {
            background: #c73650;
            transform: translateY(-1px);
        }

        /* Stats */
        .routine-stats {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 100px;
            background: #16213e;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .stat-card .stat-value {
            font-size: 28px;
            font-weight: 800;
            color: #e94560;
        }

        .stat-card .stat-label {
            font-size: 14px;
            color: #888;
            margin-top: 4px;
        }

        /* Empty State */
        .empty-routine {
            text-align: center;
            padding: 50px 20px;
            color: #666;
        }

        .empty-routine .empty-icon {
            font-size: 60px;
            margin-bottom: 16px;
        }

        .empty-routine p {
            font-size: 18px;
        }

        /* ==================== */
        /* TODO PAGE STYLES     */
        /* ==================== */

        .date-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .date-arrow {
            background: #0f3460;
            border: none;
            color: #e94560;
            font-size: 24px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .date-arrow:hover {
            background: #e94560;
            color: #fff;
        }

        .date-display {
            font-size: 22px;
            font-weight: 700;
            min-width: 200px;
            text-align: center;
        }

        .todo-input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .todo-input-section input {
            flex: 1;
            padding: 14px 16px;
            border-radius: 12px;
            border: 2px solid #0f3460;
            background: #16213e;
            color: #e0e0e0;
            font-size: 17px;
            outline: none;
        }

        .todo-input-section input:focus {
            border-color: #e94560;
        }

        .todo-add-btn {
            background: #e94560;
            border: none;
            color: #fff;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
        }

        .todo-list {
            list-style: none;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 18px;
            background: #16213e;
            border-radius: 12px;
            margin-bottom: 10px;
            transition: all 0.2s;
        }

        .todo-item:hover {
            background: #1c2a4a;
        }

        .todo-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 28px;
            height: 28px;
            border: 3px solid #0f3460;
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
        }

        .todo-item input[type="checkbox"]:checked {
            background: #e94560;
            border-color: #e94560;
        }

        .todo-item input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 16px;
            font-weight: 900;
        }

        .todo-item .todo-text {
            flex: 1;
            font-size: 17px;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #666;
        }

        .todo-item .delete-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 20px;
            padding: 4px 8px;
        }

        .todo-item .delete-btn:hover {
            color: #e94560;
        }

        /* ==================== */
        /* SETTINGS PAGE        */
        /* ==================== */

        .settings-section {
            background: #16213e;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
        }

        .settings-section h3 {
            font-size: 20px;
            color: #e94560;
            margin-bottom: 16px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 17px;
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .danger-btn {
            background: #e94560;
            border: none;
            color: #fff;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .danger-btn:hover {
            background: #c73650;
        }

        /* Section titles */
        .section-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 18px;
            color: #e94560;
        }

        /* Day labels */
        .day-header-date {
            display: block;
            font-size: 13px;
            color: #888;
            font-weight: 400;
            margin-top: 2px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            height: 6px;
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }
        ::-webkit-scrollbar-thumb {
            background: #0f3460;
            border-radius: 3px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .routine-table thead th {
                padding: 10px 4px;
                font-size: 13px;
            }
            .routine-table tbody td:first-child {
                font-size: 15px;
                padding-left: 12px;
            }
            .routine-checkbox {
                width: 30px;
                height: 30px;
            }
            .routine-checkbox:checked::after {
                font-size: 18px;
            }
            .week-label {
                font-size: 17px;
                min-width: 180px;
            }
            .add-routine-row {
                flex-wrap: wrap;
            }
            .add-routine-row input[type="text"] {
                min-width: 0;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>📋 ROUTODO</h1>
    </div>

    <!-- ============ ROUTINE PAGE ============ -->
    <div class="page active" id="page-routine">
        <div class="section-title">🔄 루틴 트래커</div>

        <!-- Week Stats -->
        <div class="routine-stats" id="routine-stats"></div>

        <!-- Week Navigator -->
        <div class="week-navigator">
            <button class="week-arrow" id="prev-week" title="이전 주">◀</button>
            <div class="week-label" id="week-label"></div>
            <button class="week-arrow" id="next-week" title="다음 주">▶</button>
            <button class="today-btn" id="today-week-btn">오늘</button>
        </div>

        <!-- Routine Table -->
        <div class="routine-table-container" id="routine-table-container">
            <div class="empty-routine" id="empty-routine">
                <div class="empty-icon">📝</div>
                <p>아래에서 루틴을 추가해보세요!</p>
            </div>
        </div>

        <!-- Add Routine -->
        <div class="add-routine-section">
            <div class="section-title" style="font-size:18px; margin-bottom:12px;">➕ 새 루틴 추가</div>
            <div class="add-routine-row">
                <input type="text" id="new-routine-name" placeholder="루틴 이름 입력..." maxlength="30">
                <input type="color" id="new-routine-color" value="#e94560" title="색상 선택">
                <button class="add-routine-btn" id="add-routine-btn">추가</button>
            </div>
        </div>
    </div>

    <!-- ============ TODO PAGE ============ -->
    <div class="page" id="page-todo">
        <div class="section-title">✅ 할 일</div>

        <div class="date-nav">
            <button class="date-arrow" id="prev-day">◀</button>
            <div class="date-display" id="todo-date-display"></div>
            <button class="date-arrow" id="next-day">▶</button>
            <button class="today-btn" id="today-todo-btn">오늘</button>
        </div>

        <div class="todo-input-section">
            <input type="text" id="todo-input" placeholder="할 일을 입력하세요...">
            <button class="todo-add-btn" id="todo-add-btn">추가</button>
        </div>

        <ul class="todo-list" id="todo-list"></ul>
    </div>

    <!-- ============ SETTINGS PAGE ============ -->
    <div class="page" id="page-settings">
        <div class="section-title">⚙️ 설정</div>

        <div class="settings-section">
            <h3>데이터 관리</h3>
            <div class="setting-item">
                <span>모든 루틴 데이터 초기화</span>
                <button class="danger-btn" id="reset-routines-btn">초기화</button>
            </div>
            <div class="setting-item">
                <span>모든 할 일 데이터 초기화</span>
                <button class="danger-btn" id="reset-todos-btn">초기화</button>
            </div>
            <div class="setting-item">
                <span>전체 데이터 초기화</span>
                <button class="danger-btn" id="reset-all-btn">전체 초기화</button>
            </div>
        </div>

        <div class="settings-section">
            <h3>정보</h3>
            <div class="setting-item">
                <span>버전</span>
                <span style="color:#888;">2.0.0</span>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item active" data-page="routine">
            <div class="nav-icon">🔄</div>
            <div class="nav-label">루틴</div>
        </div>
        <div class="nav-item" data-page="todo">
            <div class="nav-icon">✅</div>
            <div class="nav-label">할 일</div>
        </div>
        <div class="nav-item" data-page="settings">
            <div class="nav-icon">⚙️</div>
            <div class="nav-label">설정</div>
        </div>
    </div>

    <script>
        // ========== UTILITIES ==========
        function getMonday(d) {
            const date = new Date(d);
            const day = date.getDay();
            const diff = date.getDate() - day + (day === 0 ? -6 : 1);
            date.setDate(diff);
            date.setHours(0, 0, 0, 0);
            return date;
        }

        function formatDate(d) {
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            return `${d.getFullYear()}-${mm}-${dd}`;
        }

        function formatDateShort(d) {
            return `${d.getMonth() + 1}/${d.getDate()}`;
        }

        const DAY_NAMES = ['월', '화', '수', '목', '금', '토', '일'];

        // ========== DATA STORAGE ==========
        function loadData(key, fallback) {
            try {
                const data = localStorage.getItem(key);
                return data ? JSON.parse(data) : fallback;
            } catch {
                return fallback;
            }
        }

        function saveData(key, data) {
            localStorage.setItem(key, JSON.stringify(data));
        }

        // ========== NAVIGATION ==========
        const navItems = document.querySelectorAll('.nav-item');
        const pages = document.querySelectorAll('.page');

        navItems.forEach(item => {
            item.addEventListener('click', () => {
                const target = item.getAttribute('data-page');
                navItems.forEach(n => n.classList.remove('active'));
                pages.forEach(p => p.classList.remove('active'));
                item.classList.add('active');
                document.getElementById(`page-${target}`).classList.add('active');
            });
        });

        // ========================================
        // ============ ROUTINE MODULE ============
        // ========================================

        let routines = loadData('routodo-routines', []);
        let routineChecks = loadData('routodo-routine-checks', {});
        let currentWeekStart = getMonday(new Date());

        function getWeekDates(mondayDate) {
            const dates = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date(mondayDate);
                d.setDate(d.getDate() + i);
                dates.push(d);
            }
            return dates;
        }

        function renderWeekLabel() {
            const dates = getWeekDates(currentWeekStart);
            const startStr = formatDateShort(dates[0]);
            const endStr = formatDateShort(dates[6]);
            const year = dates[0].getFullYear();
            const year2 = dates[6].getFullYear();
            const yearStr = year === year2 ? `${year}년` : `${year}~${year2}년`;

            document.getElementById('week-label').innerHTML = `
                <span class="year-text">${yearStr}</span><br>
                ${startStr} ~ ${endStr}
            `;
        }

        function getCheckKey(routineId, dateStr) {
            return `${routineId}_${dateStr}`;
        }

        function isToday(d) {
            const today = new Date();
            return d.getFullYear() === today.getFullYear() &&
                   d.getMonth() === today.getMonth() &&
                   d.getDate() === today.getDate();
        }

        function renderRoutineTable() {
            const container = document.getElementById('routine-table-container');
            const emptyEl = document.getElementById('empty-routine');

            if (routines.length === 0) {
                container.innerHTML = `
                    <div class="empty-routine">
                        <div class="empty-icon">📝</div>
                        <p>아래에서 루틴을 추가해보세요!</p>
                    </div>
                `;
                renderRoutineStats();
                return;
            }

            const dates = getWeekDates(currentWeekStart);
            const today = new Date();
            const todayStr = formatDate(today);

            let html = `<table class="routine-table">
                <thead><tr>
                    <th>루틴</th>`;

            dates.forEach((d, i) => {
                const isTodayCol = isToday(d);
                html += `<th class="${isTodayCol ? 'today-col' : ''}">
                    ${DAY_NAMES[i]}
                    <span class="day-header-date">${formatDateShort(d)}</span>
                </th>`;
            });

            html += `</tr></thead><tbody>`;

            routines.forEach(routine => {
                html += `<tr>
                    <td>
                        <div class="routine-name-cell">
                            <span class="routine-color-dot" style="background:${routine.color}"></span>
                            <span>${routine.name}</span>
                            <button class="routine-delete-btn" data-id="${routine.id}" title="삭제">✕</button>
                        </div>
                    </td>`;

                dates.forEach(d => {
                    const dateStr = formatDate(d);
                    const key = getCheckKey(routine.id, dateStr);
                    const checked = routineChecks[key] ? 'checked' : '';
                    const isTodayCol = isToday(d);
                    const todayClass = isTodayCol ? 'today-check' : '';

                    html += `<td>
                        <div class="check-cell">
                            <input type="checkbox" class="routine-checkbox ${todayClass}"
                                data-routine-id="${routine.id}"
                                data-date="${dateStr}"
                                ${checked}>
                        </div>
                    </td>`;
                });

                html += `</tr>`;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;

            // Event listeners for checkboxes
            container.querySelectorAll('.routine-checkbox').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    const rid = e.target.getAttribute('data-routine-id');
                    const date = e.target.getAttribute('data-date');
                    const key = getCheckKey(rid, date);
                    if (e.target.checked) {
                        routineChecks[key] = true;
                    } else {
                        delete routineChecks[key];
                    }
                    saveData('routodo-routine-checks', routineChecks);
                    renderRoutineStats();
                });
            });

            // Delete buttons
            container.querySelectorAll('.routine-delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.target.getAttribute('data-id');
                    if (confirm('이 루틴을 삭제하시겠습니까?')) {
                        routines = routines.filter(r => r.id !== id);
                        // Clean up checks
                        Object.keys(routineChecks).forEach(key => {
                            if (key.startsWith(id + '_')) {
                                delete routineChecks[key];
                            }
                        });
                        saveData('routodo-routines', routines);
                        saveData('routodo-routine-checks', routineChecks);
                        renderRoutineTable();
                    }
                });
            });

            renderRoutineStats();
        }

        function renderRoutineStats() {
            const dates = getWeekDates(currentWeekStart);
            const totalPossible = routines.length * 7;
            let completed = 0;

            if (routines.length > 0) {
                dates.forEach(d => {
                    const dateStr = formatDate(d);
                    routines.forEach(r => {
                        const key = getCheckKey(r.id, dateStr);
                        if (routineChecks[key]) completed++;
                    });
                });
            }

            const rate = totalPossible > 0 ? Math.round((completed / totalPossible) * 100) : 0;

            // Today's completion
            const todayStr = formatDate(new Date());
            let todayDone = 0;
            routines.forEach(r => {
                if (routineChecks[getCheckKey(r.id, todayStr)]) todayDone++;
            });

            document.getElementById('routine-stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${routines.length}</div>
                    <div class="stat-label">전체 루틴</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${todayDone}/${routines.length}</div>
                    <div class="stat-label">오늘 완료</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${rate}%</div>
                    <div class="stat-label">이번 주 달성률</div>
                </div>
            `;
        }

        // Week Navigation
        document.getElementById('prev-week').addEventListener('click', () => {
            currentWeekStart.setDate(currentWeekStart.getDate() - 7);
            renderWeekLabel();
            renderRoutineTable();
        });

        document.getElementById('next-week').addEventListener('click', () => {
            currentWeekStart.setDate(currentWeekStart.getDate() + 7);
            renderWeekLabel();
            renderRoutineTable();
        });

        document.getElementById('today-week-btn').addEventListener('click', () => {
            currentWeekStart = getMonday(new Date());
            renderWeekLabel();
            renderRoutineTable();
        });

        // Add Routine
        document.getElementById('add-routine-btn').addEventListener('click', addRoutine);
        document.getElementById('new-routine-name').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addRoutine();
        });

        function addRoutine() {
            const nameInput = document.getElementById('new-routine-name');
            const colorInput = document.getElementById('new-routine-color');
            const name = nameInput.value.trim();
            if (!name) return;

            const routine = {
                id: Date.now().toString(),
                name: name,
                color: colorInput.value
            };

            routines.push(routine);
            saveData('routodo-routines', routines);
            nameInput.value = '';
            renderRoutineTable();
        }

        // Init Routine Page
        renderWeekLabel();
        renderRoutineTable();

        // ====================================
        // ============ TODO MODULE ============
        // ====================================

        let todos = loadData('routodo-todos', {});
        let currentTodoDate = new Date();

        function renderTodoDate() {
            const d = currentTodoDate;
            const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
            const str = `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} (${dayNames[d.getDay()]})`;
            document.getElementById('todo-date-display').textContent = str;
        }

        function getTodoKey() {
            return formatDate(currentTodoDate);
        }

        function renderTodos() {
            const key = getTodoKey();
            const list = todos[key] || [];
            const ul = document.getElementById('todo-list');

            if (list.length === 0) {
                ul.innerHTML = `<div class="empty-routine" style="padding:30px;">
                    <div class="empty-icon">📋</div>
                    <p>할 일이 없습니다</p>
                </div>`;
                return;
            }

            ul.innerHTML = list.map((item, idx) => `
                <li class="todo-item ${item.done ? 'completed' : ''}">
                    <input type="checkbox" ${item.done ? 'checked' : ''} data-idx="${idx}">
                    <span class="todo-text">${item.text}</span>
                    <button class="delete-btn" data-idx="${idx}">✕</button>
                </li>
            `).join('');

            ul.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    const idx = parseInt(e.target.getAttribute('data-idx'));
                    const key = getTodoKey();
                    if (todos[key] && todos[key][idx]) {
                        todos[key][idx].done = e.target.checked;
                        saveData('routodo-todos', todos);
                        renderTodos();
                    }
                });
            });

            ul.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(e.target.getAttribute('data-idx'));
                    const key = getTodoKey();
                    if (todos[key]) {
                        todos[key].splice(idx, 1);
                        if (todos[key].length === 0) delete todos[key];
                        saveData('routodo-todos', todos);
                        renderTodos();
                    }
                });
            });
        }

        document.getElementById('prev-day').addEventListener('click', () => {
            currentTodoDate.setDate(currentTodoDate.getDate() - 1);
            renderTodoDate();
            renderTodos();
        });

        document.getElementById('next-day').addEventListener('click', () => {
            currentTodoDate.setDate(currentTodoDate.getDate() + 1);
            renderTodoDate();
            renderTodos();
        });

        document.getElementById('today-todo-btn').addEventListener('click', () => {
            currentTodoDate = new Date();
            renderTodoDate();
            renderTodos();
        });

        document.getElementById('todo-add-btn').addEventListener('click', addTodo);
        document.getElementById('todo-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTodo();
        });

        function addTodo() {
            const input = document.getElementById('todo-input');
            const text = input.value.trim();
            if (!text) return;

            const key = getTodoKey();
            if (!todos[key]) todos[key] = [];
            todos[key].push({ text, done: false });
            saveData('routodo-todos', todos);
            input.value = '';
            renderTodos();
        }

        renderTodoDate();
        renderTodos();

        // ========================================
        // ============ SETTINGS MODULE ============
        // ========================================

        document.getElementById('reset-routines-btn').addEventListener('click', () => {
            if (confirm('모든 루틴 데이터를 삭제하시겠습니까?')) {
                routines = [];
                routineChecks = {};
                saveData('routodo-routines', routines);
                saveData('routodo-routine-checks', routineChecks);
                renderRoutineTable();
            }
        });

        document.getElementById('reset-todos-btn').addEventListener('click', () => {
            if (confirm('모든 할 일 데이터를 삭제하시겠습니까?')) {
                todos = {};
                saveData('routodo-todos', todos);
                renderTodos();
            }
        });

        document.getElementById('reset-all-btn').addEventListener('click', () => {
            if (confirm('모든 데이터를 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.')) {
                localStorage.clear();
                routines = [];
                routineChecks = {};
                todos = {};
                renderRoutineTable();
                renderTodos();
            }
        });
    </script>
</body>
</html>
